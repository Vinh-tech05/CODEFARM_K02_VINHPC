<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

      rel="stylesheet"
    />

  </head>

  <body>
    <div class="sun"></div>
    <div class="cloud" style="top: 120px; left: 0"></div>
    <div
      class="cloud"
      style="top: 80px; left: -300px; animation-delay: 15s"
    ></div>
    <div
      class="cloud"
      style="top: 160px; left: -600px; animation-delay: 30s"
    ></div>

    <div class="bird">🐦🐦🐦</div>

    <div class="mountain"></div>

    <div class="container py-5">
      <h1 class="text-center mb-4 header-title">
        📚 Bài tập của Phạm Công Vinh
      </h1>

      <!-- Task01 -->
      <div class="task-box">
        <h5>📁 Task01</h5>
        <a href="Task01/index.html" class="btn btn-primary btn-sm btn-custom"

        <a href="Task01/index2.html" class="btn btn-secondary btn-sm btn-custom"
          >index2.html</a

      <!-- Task02 -->

      <div class="footer">

    </div>

    <!-- ❄️ Hiệu ứng tuyết -->
    <script>
      function createSnowflake() {
        const snowflake = document.createElement("div");
        snowflake.className = "snowflake";
        snowflake.textContent = "❄️";
        snowflake.style.left = Math.random() * window.innerWidth + "px";
        snowflake.style.animationDuration = 4 + Math.random() * 4 + "s";
        snowflake.style.fontSize = 10 + Math.random() * 20 + "px";
        document.body.appendChild(snowflake);
        setTimeout(() => snowflake.remove(), 8000);
      }

      setInterval(createSnowflake, 250);
    </script>
  </body>
